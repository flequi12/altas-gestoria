services:
  app:
    build: .
    image: altas-gestoria
    container_name: altas-gestoria
    restart: unless-stopped
    # Secretos (ANTHROPIC_API_KEY, etc.) desde el .env del CT (NO va en la imagen).
    env_file: .env
    # El nginx publico (CT 100) hace TLS + reverse-proxy a este :3010 (el login es propio de la app).
    ports:
      - "3010:3010"
    environment:
      - DATA_DIR=/app/data
    volumes:
      - entradas_data:/app/data
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

volumes:
  entradas_data:
